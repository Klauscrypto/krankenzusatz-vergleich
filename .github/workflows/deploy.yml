name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Landingpages & statische Assets
      - name: Deploy public/
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "public/"
          target: "/var/www/krankenzusatz-vergleich"
          strip_components: 1

      # 2) Python-Scripts (Artikel-Generator)
      - name: Deploy scripts/
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "scripts/"
          target: "/var/www/scripts"
          strip_components: 1

      # 3) WordPress-Theme
      - name: Deploy WordPress Theme
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "src/themes/krankenzusatz/"
          target: "/var/www/krankenzusatz-vergleich/blog/wp-content/themes/krankenzusatz"
          strip_components: 3

      # 4) Python-Dependencies + Dateirechte
      - name: Install Python deps & fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Python-Dependencies
            pip3 install -q -r /var/www/scripts/requirements.txt

            # Webroot-Rechte
            chown -R www-data:www-data /var/www/krankenzusatz-vergleich
            find /var/www/krankenzusatz-vergleich -type d -exec chmod 755 {} \;
            find /var/www/krankenzusatz-vergleich -type f -exec chmod 644 {} \;

            # wp-config.php schützen
            [ -f /var/www/krankenzusatz-vergleich/blog/wp-config.php ] && \
              chmod 640 /var/www/krankenzusatz-vergleich/blog/wp-config.php

            # Scripts ausführbar machen
            chmod +x /var/www/scripts/*.sh 2>/dev/null || true

            # Nginx neu laden
            nginx -t && systemctl reload nginx
