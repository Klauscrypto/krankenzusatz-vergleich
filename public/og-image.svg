<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0057ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003fc2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- White card -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="white" opacity="0.07" />
  <!-- Logo mark -->
  <circle cx="140" cy="140" r="50" fill="white" opacity="0.15" />
  <text x="140" y="153" font-family="system-ui, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">+</text>
  <!-- Main headline -->
  <text x="600" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" text-anchor="middle">Krankenzusatz</text>
  <text x="600" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" text-anchor="middle">versicherung</text>
  <!-- Subtitle -->
  <text x="600" y="390" font-family="system-ui, sans-serif" font-size="32" font-weight="400" fill="white" opacity="0.85" text-anchor="middle">Unabhängiger Vergleich 2026 · Deutschland</text>
  <!-- Divider -->
  <rect x="460" y="420" width="280" height="3" rx="2" fill="white" opacity="0.4" />
  <!-- Domain -->
  <text x="600" y="490" font-family="system-ui, sans-serif" font-size="26" font-weight="600" fill="white" opacity="0.75" text-anchor="middle">krankenzusatz-vergleich.de</text>
  <!-- Trust badges -->
  <rect x="200" y="530" width="240" height="44" rx="22" fill="white" opacity="0.15" />
  <text x="320" y="558" font-family="system-ui, sans-serif" font-size="18" fill="white" text-anchor="middle">✓ Kostenlos</text>
  <rect x="480" y="530" width="240" height="44" rx="22" fill="white" opacity="0.15" />
  <text x="600" y="558" font-family="system-ui, sans-serif" font-size="18" fill="white" text-anchor="middle">✓ Unabhängig</text>
  <rect x="760" y="530" width="240" height="44" rx="22" fill="white" opacity="0.15" />
  <text x="880" y="558" font-family="system-ui, sans-serif" font-size="18" fill="white" text-anchor="middle">✓ Täglich aktuell</text>
</svg>
